# field_descriptions.yaml
#
# Field-name -> human description, consumed by dump_articles.ts to annotate the
# per-type field catalogue (_catalogue.json/.md). This is the machine-readable
# component extracted from the old available_fields.txt; the human-readable field
# inventory now lives in FINDINGS.txt (Appendix A). Optional: the dump still runs
# if this file is absent (catalogue just lacks descriptions).
#
# 175 fields.

